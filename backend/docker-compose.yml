services:
  postgres:
    image: postgres:16-alpine
    container_name: ig_ai_postgres
    env_file:
      - .env.example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ig_ai_redis
    ports:
      - "6379:6379"

  app:
    build:
      context: .
    container_name: ig_ai_app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: .
    container_name: ig_ai_celery_worker
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info"]
    env_file:
      - .env.example
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
